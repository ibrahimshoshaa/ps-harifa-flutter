name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Fix Firebase shim
        run: python3 fix_firebase.py

      - name: Generate app icon
        run: |
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:"#0b0e14" -fill none -stroke "#38bdf8" -strokewidth 8 -draw "circle 256,256 256,56" -font DejaVu-Sans-Bold -pointsize 140 -fill "#38bdf8" -gravity Center -annotate -0+0 "PS" /tmp/icon.png

      - name: Create Flutter scaffold
        run: |
          flutter create --org com.starnet --project-name ps_harifa temp_app
          cp -r temp_app/android .
          cp -r temp_app/ios .
          rm -rf temp_app
          convert /tmp/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ps-harifa-flutter
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
