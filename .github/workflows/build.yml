name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Fix Firebase references
        run: |
          # إنشاء supabase_service.dart لو مش موجود
          cat > lib/services/supabase_service.dart << 'DART'
          import 'dart:convert';
          import 'package:http/http.dart' as http;

          class SupabaseService {
            static const String _url = 'https://afajbspvzpjmdputdhow.supabase.co';
            static const String _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmYWpic3B2enBqbWRwdXRkaG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODc1MjIsImV4cCI6MjA5Mjk2MzUyMn0.FupMVDjogd50RL8hg3F3Dnn9rpsiUtIlcekAvVg4ZUU';

            static Map<String, String> get _headers => {
              'apikey': _key,
              'Authorization': 'Bearer $_key',
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            };

            static Future<Map<String, dynamic>?> getAppData() async {
              try {
                final r = await http.get(Uri.parse('$_url/rest/v1/app_data?id=eq.main'), headers: _headers).timeout(const Duration(seconds: 10));
                if (r.statusCode == 200) {
                  final list = jsonDecode(r.body) as List;
                  if (list.isNotEmpty) return Map<String, dynamic>.from(list.first);
                }
              } catch (e) { print('getAppData error: $e'); }
              return null;
            }

            static Future<bool> setAppData(Map<String, dynamic> data) async {
              try {
                data['id'] = 'main';
                data['updated_at'] = DateTime.now().toIso8601String();
                final r = await http.patch(Uri.parse('$_url/rest/v1/app_data?id=eq.main'), headers: _headers, body: jsonEncode(data)).timeout(const Duration(seconds: 10));
                return r.statusCode == 200 || r.statusCode == 204;
              } catch (e) { print('setAppData error: $e'); return false; }
            }

            static Future<List<Map<String, dynamic>>> getArchives() async {
              try {
                final r = await http.get(Uri.parse('$_url/rest/v1/archives?order=created_at.desc'), headers: _headers).timeout(const Duration(seconds: 10));
                if (r.statusCode == 200) return (jsonDecode(r.body) as List).map((v) => Map<String, dynamic>.from(v)).toList();
              } catch (e) { print('getArchives error: $e'); }
              return [];
            }

            static Future<bool> pushArchive(Map<String, dynamic> data) async {
              try {
                final r = await http.post(Uri.parse('$_url/rest/v1/archives'), headers: _headers, body: jsonEncode(data)).timeout(const Duration(seconds: 10));
                return r.statusCode == 201;
              } catch (e) { print('pushArchive error: $e'); return false; }
            }

            static Future<bool> deleteArchives() async {
              try {
                final r = await http.delete(Uri.parse('$_url/rest/v1/archives?id=neq.00000000-0000-0000-0000-000000000000'), headers: _headers).timeout(const Duration(seconds: 10));
                return r.statusCode == 200 || r.statusCode == 204;
              } catch (e) { print('deleteArchives error: $e'); return false; }
            }

            static Future<List<Map<String, dynamic>>> getYearlyArchives() async {
              try {
                final r = await http.get(Uri.parse('$_url/rest/v1/yearly_archives?order=created_at.desc'), headers: _headers).timeout(const Duration(seconds: 10));
                if (r.statusCode == 200) return (jsonDecode(r.body) as List).map((v) => Map<String, dynamic>.from(v)).toList();
              } catch (e) { print('getYearlyArchives error: $e'); }
              return [];
            }

            static Future<bool> pushYearlyArchive(Map<String, dynamic> data) async {
              try {
                final r = await http.post(Uri.parse('$_url/rest/v1/yearly_archives'), headers: _headers, body: jsonEncode(data)).timeout(const Duration(seconds: 10));
                return r.statusCode == 201;
              } catch (e) { print('pushYearlyArchive error: $e'); return false; }
            }
          }
          DART

          # إنشاء firebase_service.dart وهمي يشير لـ Supabase
          cat > lib/services/firebase_service.dart << 'DART'
          export 'supabase_service.dart';
          class FirebaseService {
            static Future<dynamic> get(String path) => path == 'archives' ? SupabaseService.getArchives() : SupabaseService.getAppData();
            static Future<bool> set(String path, dynamic data) => SupabaseService.setAppData(data);
            static Future<String?> push(String path, dynamic data) async {
              final ok = path == 'yearly_archives' ? await SupabaseService.pushYearlyArchive(data) : await SupabaseService.pushArchive(data);
              return ok ? 'ok' : null;
            }
            static Future<bool> delete(String path) => SupabaseService.deleteArchives();
          }
          DART

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.starnet --project-name ps_harifa temp_app
          cp -r temp_app/android .
          cp -r temp_app/ios .
          rm -rf temp_app

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ps-harifa-flutter
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
