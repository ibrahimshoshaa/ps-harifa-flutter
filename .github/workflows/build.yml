name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.starnet --project-name ps_harifa temp_app
          cp -r temp_app/android .
          cp -r temp_app/ios .
          cp temp_app/analysis_options.yaml . || true
          rm -rf temp_app

      - name: Install app icons
        run: |
          ICON_DST="android/app/src/main/res"
          echo "" | base64 -d > $ICON_DST/mipmap-mdpi/ic_launcher.png
          echo "" | base64 -d > $ICON_DST/mipmap-mdpi/ic_launcher_round.png
          echo "" | base64 -d > $ICON_DST/mipmap-hdpi/ic_launcher.png
          echo "" | base64 -d > $ICON_DST/mipmap-hdpi/ic_launcher_round.png
          echo "" | base64 -d > $ICON_DST/mipmap-xhdpi/ic_launcher.png
          echo "" | base64 -d > $ICON_DST/mipmap-xhdpi/ic_launcher_round.png
          echo "" | base64 -d > $ICON_DST/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > $ICON_DST/mipmap-xxhdpi/ic_launcher_round.png
          echo "" | base64 -d > $ICON_DST/mipmap-xxxhdpi/ic_launcher.png
          echo "" | base64 -d > $ICON_DST/mipmap-xxxhdpi/ic_launcher_round.png
          echo "✅ Icons installed!"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ps-harifa-flutter
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
